{% extends 'base.html' %}

{% block auth_content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-900 via-indigo-800 to-purple-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">💰</div>
            <h1 class="text-4xl font-bold text-white">FinanceIQ</h1>
            <p class="text-indigo-300 mt-2">Tu asistente financiero inteligente</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Iniciar sesión</h2>

            {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Usuario
                    </label>
                    <input
                        type="text"
                        name="username"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        placeholder="Tu nombre de usuario"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Contraseña
                    </label>
                    <input
                        type="password"
                        name="password"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"
                        placeholder="Tu contraseña"
                    >
                </div>

                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-colors duration-200">
                    Iniciar sesión
                </button>
            </form>

            <p class="text-center text-gray-500 text-sm mt-6">
                ¿No tienes cuenta?
                <a href="{% url 'register' %}" class="text-indigo-600 font-medium hover:underline">
                    Regístrate aquí
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
